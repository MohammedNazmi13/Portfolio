<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cert.title }} - Mohammed Nazmi's Portfolio</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0a0f1e;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .header {
            height: 60px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }
        .title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #00ffaa;
        }
        .actions {
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-outline {
            border: 1px solid rgba(0, 255, 170, 0.3);
            color: #00ffaa;
        }
        .btn-outline:hover {
            background: rgba(0, 255, 170, 0.1);
        }
        .viewer-container {
            height: calc(100% - 60px);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        iframe, img {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{ cert.title }}</div>
        <div class="actions">
            <a href="{{ cert.image_url }}" download class="btn btn-outline">
                <i class="fas fa-download"></i> Download
            </a>
            <a href="/" class="btn btn-outline">
                <i class="fas fa-home"></i> Back to Portfolio
            </a>
        </div>
    </div>
    <div class="viewer-container">
        {% if cert.image_url.lower().endswith('.pdf') %}
            <iframe src="{{ cert.image_url }}#toolbar=1" type="application/pdf"></iframe>
        {% else %}
            <img src="{{ cert.image_url }}" alt="{{ cert.title }}">
        {% endif %}
    </div>
</body>
</html>
