{% extends 'admin/base_admin.html' %}

{% block content %}
<div class="form-wrapper">
    <div class="dashboard-header">
        <h2>{{ 'Edit' if experience else 'Add New' }} Experience</h2>
        <a href="{{ url_for('admin.experience') }}" class="btn btn-secondary">Back to List</a>
    </div>

    <form method="POST" class="admin-form">
        <div class="form-group">
            <label for="job_title">Job Title *</label>
            <input type="text" id="job_title" name="job_title" value="{{ experience.job_title if experience else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="company">Company / Organization *</label>
            <input type="text" id="company" name="company" value="{{ experience.company if experience else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="date_range">Date Range (e.g. Jan 2022 - Present) *</label>
            <input type="text" id="date_range" name="date_range" value="{{ experience.date_range if experience else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" name="description" rows="5" required>{{ experience.description if experience else '' }}</textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">{{ 'Update' if experience else 'Create' }} Experience Entry</button>
    </form>
</div>
{% endblock %}
