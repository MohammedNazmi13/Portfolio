{% extends 'base.html' %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<section class="hero-section" style="min-height: 80vh; text-align: center;">
    <div class="hero-content">
        <h1 class="highlight" style="font-size: 6rem; margin-bottom: 0;">404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for doesn't exist or has been moved.</p>
        <div class="hero-buttons" style="justify-content: center; margin-top: 2rem;">
            <a href="{{ url_for('public.index') }}" class="btn btn-primary">Go Home</a>
        </div>
    </div>
</section>
{% endblock %}
