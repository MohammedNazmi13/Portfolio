<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammed Nazmi's CV</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #333;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .fallback {
            color: white;
            text-align: center;
            padding-top: 50px;
            font-family: sans-serif;
        }
        .fallback a {
            color: #00ffaa;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    {% if site.resume_url %}
        <iframe src="{{ site.resume_url }}#title=Mohammed Nazmi's CV">
            <div class="fallback">
                This browser does not support PDFs. Please download the PDF to view it: 
                <a href="{{ site.resume_url }}">Download PDF</a>
            </div>
        </iframe>
    {% else %}
        <div class="fallback">
            Resume not found. <a href="/">Return to Home</a>
        </div>
    {% endif %}
</body>
</html>
